<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a0a14"/>
      <stop offset="1" stop-color="#050508"/>
    </linearGradient>
    <radialGradient id="glow1" cx="0.78" cy="0.18" r="0.45">
      <stop offset="0" stop-color="#8b5cf6" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#8b5cf6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="0.1" cy="0.85" r="0.45">
      <stop offset="0" stop-color="#2dd4bf" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#2dd4bf" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="grad" x1="0" y1="0" x2="1" y2="0.4">
      <stop offset="0" stop-color="#2dd4bf"/>
      <stop offset="0.5" stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="logoQ1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2dd4bf"/>
      <stop offset="1" stop-color="#38bdf8"/>
    </linearGradient>
    <linearGradient id="logoQ2" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="logoQ3" x1="1" y1="1" x2="0" y2="0">
      <stop offset="0" stop-color="#8b5cf6"/>
      <stop offset="1" stop-color="#f4f5fa"/>
    </linearGradient>
    <linearGradient id="logoQ4" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0" stop-color="#f4f5fa"/>
      <stop offset="1" stop-color="#2dd4bf"/>
    </linearGradient>
    <clipPath id="logoClip">
      <rect x="80" y="80" width="80" height="80" rx="20" ry="20"/>
    </clipPath>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow1)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <!-- Subtle grid -->
  <g stroke="rgba(255,255,255,0.04)" stroke-width="1">
    <path d="M0 100 H1200 M0 200 H1200 M0 300 H1200 M0 400 H1200 M0 500 H1200"/>
    <path d="M100 0 V630 M200 0 V630 M300 0 V630 M400 0 V630 M500 0 V630 M600 0 V630 M700 0 V630 M800 0 V630 M900 0 V630 M1000 0 V630 M1100 0 V630"/>
  </g>

  <!-- Logo mark -->
  <g clip-path="url(#logoClip)">
    <rect x="80" y="80" width="40" height="40" fill="url(#logoQ1)"/>
    <rect x="120" y="80" width="40" height="40" fill="url(#logoQ2)"/>
    <rect x="120" y="120" width="40" height="40" fill="url(#logoQ3)"/>
    <rect x="80" y="120" width="40" height="40" fill="url(#logoQ4)"/>
  </g>
  <rect x="92" y="92" width="56" height="56" rx="13" ry="13" fill="#050508"/>

  <text x="180" y="135" font-family="'Space Grotesk', 'Inter', sans-serif" font-size="42" font-weight="700" fill="#f4f5fa">Cybespoke</text>

  <!-- Headline -->
  <text x="80" y="320" font-family="'Space Grotesk', 'Inter', sans-serif" font-size="84" font-weight="700" fill="#f4f5fa" letter-spacing="-2">Tailor‑made</text>
  <text x="80" y="410" font-family="'Space Grotesk', 'Inter', sans-serif" font-size="84" font-weight="700" fill="url(#grad)" letter-spacing="-2">websites, apps</text>
  <text x="80" y="500" font-family="'Space Grotesk', 'Inter', sans-serif" font-size="84" font-weight="700" fill="#f4f5fa" letter-spacing="-2">&amp; smart tools.</text>

  <!-- Footer -->
  <text x="80" y="580" font-family="'Inter', sans-serif" font-size="24" fill="#8e8fa3">A Belfast software studio · cybespoke.co.uk</text>
</svg>
